# Phase 1 Training Config
training:
  max_iterations: 2000
  games_per_iteration: 10
  eval_interval: 10
  save_interval: 50
  max_steps_per_game: 500

ppo:
  state_dim: 382
  action_dim: 384
  learning_rate: 0.0003
  gamma: 0.99
  gae_lambda: 0.95
  clip_epsilon: 0.2
  value_coef: 0.5
  entropy_coef: 0.01
  max_grad_norm: 0.5
  epochs_per_update: 10
  batch_size: 64

environment:
  ppo_seats: [0, 2]
  rule_ai_seats: [1, 3]
  host_path: "tools/PpoEngineHost/bin/Release/net6.0/PpoEngineHost"

evaluation:
  num_eval_games: 100
  eval_seeds_file: "rl_training/eval_seeds.txt"

logging:
  log_dir: "logs/phase1"
  checkpoint_dir: "checkpoints/phase1"
