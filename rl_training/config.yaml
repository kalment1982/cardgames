# RL训练配置文件

# LLM API配置
llm:
  # API类型: openai / anthropic / custom
  api_type: "openai"

  # API配置 - 使用CODEX配置（OpenAI兼容格式）
  api_key: "${CODEX_API_KEY}"
  api_base: "${CODEX_API_BASE}"
  model: "gpt-5.4"  # 使用服务商当前支持的最高通用模型

  # 请求参数
  max_tokens: 1024
  temperature: 0.7
  timeout: 30

  # 自定义请求头（可选）
  headers: {}

# 数据生成配置
data_generation:
  num_games: 1000  # 生成多少局游戏数据
  save_path: "data/expert_dataset.json"
  batch_size: 10  # 每批处理多少局
  resume_from: null  # 如果中断，可以从某个位置继续

# 预训练配置
pretrain:
  epochs: 10
  batch_size: 256
  learning_rate: 0.0003
  weight_decay: 0.0001
  save_path: "checkpoints/pretrained_from_llm.pt"
  validation_split: 0.1

# PPO训练配置
ppo:
  num_iterations: 1000
  games_per_iteration: 1000
  num_workers: 8
  learning_rate: 0.0003
  gamma: 0.99
  gae_lambda: 0.95
  clip_epsilon: 0.2
  value_loss_coef: 0.5
  entropy_coef: 0.01
  max_grad_norm: 0.5
  ppo_epochs: 4
  batch_size: 256

# 增强状态编码配置
state_encoding:
  base_dim: 338
  opponent_belief_dim: 54  # 对手手牌推断特征
  play_pattern_dim: 20     # 历史出牌模式特征
  # 总维度: 412

# 系统配置
system:
  device: "mps"  # mps / cpu / cuda
  num_workers: 8
  log_interval: 10
  eval_interval: 50
  save_interval: 100
  tensorboard_dir: "logs/tensorboard"
